name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 15 \
            --request GET \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/")

          echo "HTTP status: $STATUS"

          # 200 = ok | 401 = risponde ma richiede auth (ok) | 404 = risponde (ok)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "404" ]; then
            echo "✅ Supabase attivo e raggiungibile (status $STATUS)."
          else
            echo "⚠️ Risposta inattesa: $STATUS"
            exit 1
          fi
