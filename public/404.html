<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // SPA redirect per GitHub Pages
    // Quando si accede direttamente a /stocksafe/inventory ecc,
    // GitHub serve questo 404.html. Salviamo il percorso e torniamo all'index.
    var seg = window.location.pathname.split('/').slice(0,2).join('/'); // /stocksafe
    var path = window.location.pathname.slice(seg.length) || '/';
    sessionStorage.setItem('spa_path', path + window.location.search);
    window.location.replace(seg + '/');
  </script>
</head>
<body></body>
</html>
